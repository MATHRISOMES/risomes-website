# ============================================================
# Configuration Netlify - RISOMES
# Sécurité + redirections + headers
# ============================================================

# --- Headers de sécurité appliqués à tout le site ---
[[headers]]
  for = "/*"
  [headers.values]
    # Empêche le site d'être affiché dans une <iframe> sur un autre domaine (anti-clickjacking)
    X-Frame-Options = "SAMEORIGIN"
    # Empêche le navigateur de "deviner" le type de fichier (anti-injection de scripts)
    X-Content-Type-Options = "nosniff"
    # Active la protection XSS des anciens navigateurs
    X-XSS-Protection = "1; mode=block"
    # Limite les informations envoyées aux sites externes lors d'un clic sortant
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Désactive l'accès caméra/micro/géoloc par défaut (le site n'en a pas besoin)
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Force HTTPS pendant 1 an (une fois bien testé en HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# --- Page intranet : non indexable + anti-cache agressif pour éviter
#     qu'une page mise en cache reste visible après déconnexion ---
[[headers]]
  for = "/intranet.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-cache, no-store, must-revalidate"

# --- Redirection 404 propre ---
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
